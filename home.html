<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .container {
      width: 30%;
      height: 30%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid lightblue;
      margin: auto;
      border-radius: 30px;
    }
    .calculator {
      padding: 20px;
      border-radius: 10px;
      width: 78%;
    }
    .calculator form input {
      border: 0;
      outline: 0;
      width: 40px;
      height: 40px;
      border-radius: 50px;
      background-color: cadetblue;
      font-size: 20px;
      cursor: pointer;
      margin: 10px;
      color: white;
    }
    form .display {
      display: flex;
      justify-content: flex-end;
      margin: 20px 0;
    }

    form .display input {
      text-align: right;
      flex: 1;
      font-size: 40px;
      height: 40px;
      width: 25px;
    }
    form input.equal {
      width: 90%;
    }
    form input.operator {
      color: white;
    }
  </style>
  <body>
    <div class="container">
      <div class="calculator">
        <form>
          <div class="display">
            <input type="text" name="display" />
          </div>
          <div>
            <input
              type="button"
              value="C"
              onclick="clearDisplay()"
              class="operator"
            />
            <input
              type="button"
              value="⌫"
              onclick="backspace()"
              class="operator"
            />
            <input type="button" value="%" onclick="percent()" />
            <input type="button" value="/" onclick="appendValue('/')" />
          </div>
          <div>
            <input type="button" value="7" onclick="appendValue('7')" />
            <input type="button" value="8" onclick="appendValue('8')" />
            <input type="button" value="9" onclick="appendValue('9')" />
            <input type="button" value="*" onclick="appendValue('*')" />
          </div>

          <div>
            <input type="button" value="4" onclick="appendValue('4')" />
            <input type="button" value="5" onclick="appendValue('5')" />
            <input type="button" value="6" onclick="appendValue('6')" />
            <input type="button" value="-" onclick="appendValue('-')" />
          </div>
          <div>
            <input type="button" value="1" onclick="appendValue('1')" />
            <input type="button" value="2" onclick="appendValue('2')" />
            <input type="button" value="3" onclick="appendValue('3')" />
            <input type="button" value="+" onclick="appendValue('+')" />
          </div>
          <div>
            <input type="button" value="0" onclick="appendValue('0')" />
            <input type="button" value="(" onclick="appendValue('(')" />
            <input type="button" value=")" onclick="appendValue(')')" />
            <input type="button" value="." onclick="appendValue('.')" />
            <input type="button" value="=" onclick="evaluate()" class="equal" />
          </div>
        </form>
      </div>
    </div>

    <script>
      const display = document.querySelector('input[name="display"]');

      function clearDisplay() {
        display.value = "";
      }

      function backspace() {
        display.value = display.value.slice(0, -1);
      }

      function appendValue(value) {
        display.value += value;
      }

      function percent() {
        try {
          const result = eval(display.value || "0");
          display.value = result / 100;
        } catch {
          display.value = "Error";
        }
      }

      function evaluate() {
        try {
          display.value = eval(display.value || "0");
        } catch {
          display.value = "Error";
        }
      }
    </script>
  </body>
</html>
